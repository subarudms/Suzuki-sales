<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鈴木銷售查詢</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="p-4 max-w-lg mx-auto">
        <h1 class="text-2xl font-black text-blue-800 mb-4 tracking-tight">SUZUKI 銷售快速查詢</h1>
        <input type="text" id="q" placeholder="🔍 輸入車型 (如: Jimny, Vitara)..." 
            class="w-full p-4 rounded-2xl border-none shadow-lg mb-6 focus:ring-4 focus:ring-blue-300">
        <div id="list" class="space-y-4"></div>
    </div>
    <script src="data.js"></script>
    <script>
        const list = document.getElementById('list');
        const q = document.getElementById('q');
        function render(filter = '') {
            list.innerHTML = carData.filter(c => c.model.toLowerCase().includes(filter.toLowerCase()))
                .map(c => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-black text-xl text-slate-800">${c.model}</span>
                        <span class="text-xs font-bold bg-blue-100 text-blue-700 px-2 py-1 rounded-full">${c.year}</span>
                    </div>
                    <div class="text-2xl font-black text-red-500 mb-2">總條件: $${c.total}</div>
                    <div class="text-sm text-slate-500 bg-slate-50 p-3 rounded-lg border-l-4 border-slate-300">${c.detail}</div>
                </div>
            `).join('');
        }
        q.addEventListener('input', (e) => render(e.target.value));
        render();
    </script>
</body>
</html>
