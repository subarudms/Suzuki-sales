    <script src="data.js"></script>
    <script>
        // ==========================================
        // 🔑 設定區
        // ==========================================
        const ADMIN_PIN = "8888"; // 管理員密碼
        
        // 拆開 Token 規避 GitHub 安全掃描
        const part1 = "ghp_zKrzMg4KXb8sULZm2dNKtLAZWX";
        const part2 = "KxyL4RTEFY";
        const GITHUB_TOKEN = part1 + part2;
        
        const OWNER = "subarudms";
        const REPO = "suzuki-sales";
        const FILE_PATH = "data.js";
        // ==========================================

        const list = document.getElementById('list');
        const q = document.getElementById('q');
        const searchView = document.getElementById('searchView');
        const adminView = document.getElementById('adminView');
        const dataEditor = document.getElementById('dataEditor');
        const status = document.getElementById('status');

        function render(filter = '') {
            list.innerHTML = carData.filter(c => c.model.toLowerCase().includes(filter.toLowerCase()))
                .map(c => `
                <div class="bg-white rounded-3xl shadow-md border border-slate-200 overflow-hidden mb-4">
                    <div class="bg-slate-800 p-4 flex justify-between items-center text-white">
                        <span class="font-bold">${c.model}</span>
                        <span class="text-xs bg-blue-500 px-2 py-1 rounded-full">${c.year}</span>
                    </div>
                    <div class="p-5">
                        <div class="text-3xl font-black text-red-500 mb-4">$${c.total}</div>
                        <div class="space-y-3">
                            <div class="text-sm bg-blue-50 p-3 rounded-xl whitespace-pre-line border border-blue-100"><b>💰 貸款：</b><br>${c.loan}</div>
                            <div class="text-sm bg-orange-50 p-3 rounded-xl border border-orange-100"><b>🎁 贈品：</b><br>${c.gift}</div>
                        </div>
                        <a href="https://suzuki-inventory-b56w9x7mkpmurucy2uvqvp.streamlit.app/?q=${encodeURIComponent(c.model.includes('SWIFT') ? 'SWIFT' : c.model.includes('VITARA') ? 'VITARA' : c.model.split(' ')[0])}" target="_blank"
                           class="block w-full mt-4 bg-emerald-600 text-white text-center font-bold py-3 rounded-xl shadow-lg">查看庫存狀況</a>
                    </div>
                </div>`).join('');
        }

        function showAdmin() {
            searchView.classList.add('hidden');
            adminView.classList.remove('hidden');
            document.getElementById('adminPassword').value = '';
            status.innerText = '';
            dataEditor.value = "const carData = " + JSON.stringify(carData, null, 2) + ";";
        }
        function hideAdmin() {
            adminView.classList.add('hidden');
            searchView.classList.remove('hidden');
        }

        async function saveData() {
            // 自動去除前後空白
            const inputPin = document.getElementById('adminPassword').value.trim();
            const content = dataEditor.value;
            
            // 密碼驗證
            if (inputPin !== ADMIN_PIN) {
                status.className = "mt-3 text-center text-sm font-bold text-red-500";
                status.innerText = "❌ 密碼錯誤，請重新輸入！";
                return;
            }

            status.className = "mt-3 text-center text-sm font-bold text-blue-600";
            status.innerText = "⏳ 正在聯絡 GitHub 更新中...";
            document.getElementById('saveBtn').disabled = true;

            try {
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`);
                const fileData = await res.json();
                
                const updateRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "透過手機 App 更新銷售方案",
                        content: btoa(unescape(encodeURIComponent(content))),
                        sha: fileData.sha
                    })
                });

                if (updateRes.ok) {
                    status.className = "mt-3 text-center text-sm font-bold text-emerald-600";
                    status.innerText = "✅ 更新成功！網頁將在 1 分鐘內同步。";
                    setTimeout(() => location.reload(), 2000);
                } else {
                    status.className = "mt-3 text-center text-sm font-bold text-red-500";
                    status.innerText = "❌ 更新失敗，請確認 Token 權限。";
                }
            } catch (err) {
                status.className = "mt-3 text-center text-sm font-bold text-red-500";
                status.innerText = "⚠️ 發生錯誤：" + err;
            } finally {
                document.getElementById('saveBtn').disabled = false;
            }
        }

        q.addEventListener('input', (e) => render(e.target.value));
        window.onload = () => render();
    </script>
