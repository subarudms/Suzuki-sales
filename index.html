<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUZUKI 銷售管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .whitespace-pre-line { white-space: pre-line; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-20 text-slate-800">
    <div id="app" class="p-4 max-w-lg mx-auto">
        
        <!-- 頂部標題與搜尋列 -->
        <div class="sticky top-0 bg-slate-100 pt-2 pb-4 z-10">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-2xl font-black text-blue-900 tracking-tight">SUZUKI 銷售查詢</h1>
                <!-- 幹部模式開關按鈕 -->
                <button id="managerStatusBtn" onclick="toggleManagerPrompt()" class="text-xs font-bold px-3 py-1.5 rounded-full bg-slate-200 text-slate-600 transition-all">
                    🔒 一般業務視角
                </button>
            </div>
            <input type="text" id="q" placeholder="🔍 搜尋車型 (如 Swift, Vitara)..." 
                   class="w-full p-4 rounded-2xl border border-slate-200 shadow-lg focus:outline-none focus:ring-4 focus:ring-blue-400 text-lg">
        </div>

        <!-- 錯誤提示區域 -->
        <div id="errorBox" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-2xl mb-4 text-sm font-bold"></div>

        <!-- 主查詢列表 -->
        <div id="searchView">
            <div id="list" class="space-y-6 mt-2">
                <div class="text-center py-10 text-slate-400 font-bold">資料載入中...</div>
            </div>
            <button onclick="showAdminPrompt()" class="mt-16 w-full text-slate-400 text-xs py-4 text-center">—— 管理員/後台登入 ——</button>
        </div>

        <!-- 直覺化管理後台介面 (預設隱藏，驗證成功後才可見) -->
        <div id="adminView" class="hidden bg-white p-6 rounded-3xl shadow-2xl mt-2 border border-slate-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800">表單式資料編輯器</h2>
                <button onclick="hideAdmin()" class="text-slate-400 text-sm font-bold bg-slate-100 px-3 py-1 rounded-full">返回</button>
            </div>

            <!-- 動態車型編輯列表區域 -->
            <div id="editorFormContainer" class="space-y-6 mb-6"></div>

            <button onclick="addCarModelForm()" class="w-full py-3 mb-6 bg-slate-100 text-blue-700 font-bold rounded-2xl border border-dashed border-blue-300 active:bg-blue-50">
                ➕ 新增一筆車型方案
            </button>
            
            <button id="saveBtn" onclick="saveDataFromForm()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:bg-blue-800 transition-all text-base">
                確認更新並同步至 GitHub
            </button>
            <p id="status" class="mt-3 text-center text-sm font-bold"></p>
        </div>
    </div>

    <!-- 載入資料庫 -->
    <script src="data.js"></script>

    <script>
        // ==========================================
        // 🔑 金鑰與權限設定
        // ==========================================
        const ADMIN_PIN = "8888"; // 解鎖密碼
        let isManagerUnlocked = false; // 權限開關

        const part1 = "ghp_zKrzMg4KXb8sULZm2dNKtLAZWX";
        const part2 = "KxyL4RTEFY";
        const GITHUB_TOKEN = part1 + part2;
        
        const OWNER = "subarudms";
        const REPO = "suzuki-sales";
        const FILE_PATH = "data.js";
        // ==========================================

        const list = document.getElementById('list');
        const q = document.getElementById('q');
        const searchView = document.getElementById('searchView');
        const adminView = document.getElementById('adminView');
        const editorFormContainer = document.getElementById('editorFormContainer');
        const status = document.getElementById('status');
        const errorBox = document.getElementById('errorBox');
        const managerStatusBtn = document.getElementById('managerStatusBtn');

        // 切換幹部權限視角
        function toggleManagerPrompt() {
            if (isManagerUnlocked) {
                isManagerUnlocked = false;
                managerStatusBtn.className = "text-xs font-bold px-3 py-1.5 rounded-full bg-slate-200 text-slate-600 transition-all";
                managerStatusBtn.innerText = "🔒 一般業務視角";
                render(q.value);
            } else {
                const pin = prompt("請輸入幹部權限解鎖密碼：");
                if (pin && pin.trim() === ADMIN_PIN) {
                    isManagerUnlocked = true;
                    managerStatusBtn.className = "text-xs font-bold px-3 py-1.5 rounded-full bg-red-500 text-white shadow-md transition-all";
                    managerStatusBtn.innerText = "🔑 幹部超折已解鎖";
                    render(q.value);
                } else if (pin) {
                    alert("❌ 密碼錯誤！無法解鎖權限。");
                }
            }
        }

        // 渲染前台卡片
        function render(filter = '') {
            try {
                if (typeof carData === 'undefined' || !Array.isArray(carData)) {
                    showError("⚠️ 找不到 carData 資料，請檢查 data.js 檔案內容。");
                    list.innerHTML = '<div class="text-center py-10 text-red-500 font-bold">資料格式異常，請點擊下方管理員登入修復。</div>';
                    return;
                }

                const filtered = carData.filter(c => c.model.toLowerCase().includes(filter.toLowerCase()));
                
                if (filtered.length === 0) {
                    list.innerHTML = '<div class="text-center py-10 text-slate-400 font-bold">沒有找到符合條件的車型</div>';
                    return;
                }

                list.innerHTML = filtered.map(c => `
                    <div class="bg-white rounded-3xl shadow-md border border-slate-200 overflow-hidden mb-4">
                        <div class="bg-slate-800 p-4 flex justify-between items-center text-white">
                            <span class="font-bold text-lg">${c.model}</span>
                            <span class="text-xs bg-blue-500 px-3 py-1 rounded-full font-bold">${c.year} 年式</span>
                        </div>
                        <div class="p-5">
                            <div class="text-xs text-slate-400 font-bold mb-1">折讓總條件</div>
                            <div class="text-3xl font-black text-red-500 mb-2">$${c.total}</div>
                            
                            <!-- 公開內容 -->
                            <div class="text-xs text-slate-500 mb-3">${c.detail}</div>

                            <!-- 🔑 幹部權限區塊 -->
                            ${isManagerUnlocked && c.managerDiscount ? `
                                <div class="bg-red-50 border border-red-200 p-3 rounded-2xl mb-4 text-xs font-bold text-red-700">
                                    🔑 幹部權限核對：<br>${c.managerDiscount}
                                </div>
                            ` : ''}

                            <div class="space-y-3">
                                <div class="text-sm bg-blue-50 p-3 rounded-xl whitespace-pre-line border border-blue-100">
                                    <b class="text-blue-800">💰 貸款優惠：</b><br>${c.loan}
                                </div>
                                <div class="text-sm bg-orange-50 p-3 rounded-xl border border-orange-100">
                                    <b class="text-orange-800">🎁 本月贈品：</b><br>${c.gift}
                                </div>
                            </div>

                            <a href="https://suzuki-inventory-b56w9x7mkpmurucy2uvqvp.streamlit.app/?q=${encodeURIComponent(c.model.includes('SWIFT') ? 'SWIFT' : c.model.includes('VITARA') ? 'VITARA' : c.model.split(' ')[0])}" 
                               target="_blank"
                               class="block w-full mt-4 bg-emerald-600 text-white text-center font-bold py-3.5 rounded-2xl shadow-lg active:bg-emerald-700 transition-colors">
                                📋 查看庫存狀況
                            </a>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                showError("渲染發生錯誤: " + err.message);
            }
        }

        function showError(msg) {
            errorBox.innerText = msg;
            errorBox.classList.remove('hidden');
        }

        // 先跳出密碼詢問，驗證成功才進後台
        function showAdminPrompt() {
            const pin = prompt("🔐 請輸入管理員密碼進人後台：");
            if (pin && pin.trim() === ADMIN_PIN) {
                searchView.classList.add('hidden');
                adminView.classList.remove('hidden');
                status.innerText = '';
                buildFormFromData();
            } else if (pin) {
                alert("❌ 密碼錯誤，無法進人管理後台！");
            }
        }

        function hideAdmin() {
            adminView.classList.add('hidden');
            searchView.classList.remove('hidden');
        }

        // 建構表單卡片
        function buildFormFromData() {
            if (typeof carData === 'undefined' || !Array.isArray(carData)) return;
            
            editorFormContainer.innerHTML = carData.map((c, index) => `
                <div class="car-form-item bg-slate-50 border border-slate-200 p-4 rounded-2xl relative" data-index="${index}">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-black text-blue-900 bg-blue-100 px-2.5 py-1 rounded-lg">車型選項 #${index + 1}</span>
                        <button onclick="removeCarForm(${index})" class="text-xs text-red-500 font-bold bg-red-50 px-2 py-1 rounded-lg border border-red-200">刪除此車型</button>
                    </div>

                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-0.5">車型名稱</label>
                            <input type="text" value="${c.model || ''}" class="f-model w-full p-2 text-xs font-bold border rounded-lg">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 mb-0.5">年式</label>
                            <input type="text" value="${c.year || ''}" class="f-year w-full p-2 text-xs font-bold border rounded-lg">
                        </div>
                    </div>

                    <div class="mb-2">
                        <label class="block text-[11px] font-bold text-slate-500 mb-0.5">總條件金額 ($)</label>
                        <input type="text" value="${c.total || ''}" class="f-total w-full p-2 text-xs font-bold border rounded-lg text-red-600">
                    </div>

                    <div class="mb-2">
                        <label class="block text-[11px] font-bold text-slate-500 mb-0.5">公開明細 (發票/配件)</label>
                        <input type="text" value="${c.detail || ''}" class="f-detail w-full p-2 text-xs border rounded-lg">
                    </div>

                    <div class="mb-2">
                        <label class="block text-[11px] font-bold text-red-600 mb-0.5">🔑 幹部超折權限 (所長/經理超折)</label>
                        <input type="text" value="${c.managerDiscount || ''}" placeholder="例如: 所長超折 $5,000 / 經理超折 $5,000" class="f-manager w-full p-2 text-xs border border-red-200 bg-red-50/30 rounded-lg">
                    </div>

                    <div class="mb-2">
                        <label class="block text-[11px] font-bold text-slate-500 mb-0.5">貸款優惠內容</label>
                        <textarea class="f-loan w-full p-2 text-xs border rounded-lg h-16">${c.loan || ''}</textarea>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 mb-0.5">本月贈品內容</label>
                        <textarea class="f-gift w-full p-2 text-xs border rounded-lg h-16">${c.gift || ''}</textarea>
                    </div>
                </div>
            `).join('');
        }

        // 動態新增車型
        function addCarModelForm() {
            carData.push({
                model: "NEW MODEL",
                year: "2026",
                total: "0",
                detail: "發票 $0 + 配件 $0",
                managerDiscount: "",
                loan: "一般低利貸款專案",
                gift: "基礎交車禮"
            });
            buildFormFromData();
        }

        // 動態刪除車型
        function removeCarForm(index) {
            if (confirm("確定要刪除這個車型嗎？")) {
                carData.splice(index, 1);
                buildFormFromData();
            }
        }

        // 直接同步上傳至 GitHub
        async function saveDataFromForm() {
            // 收集所有車型數據
            const formItems = document.querySelectorAll('.car-form-item');
            const updatedData = [];

            formItems.forEach(item => {
                updatedData.push({
                    model: item.querySelector('.f-model').value.trim(),
                    year: item.querySelector('.f-year').value.trim(),
                    total: item.querySelector('.f-total').value.trim(),
                    detail: item.querySelector('.f-detail').value.trim(),
                    managerDiscount: item.querySelector('.f-manager').value.trim(),
                    loan: item.querySelector('.f-loan').value.trim(),
                    gift: item.querySelector('.f-gift').value.trim()
                });
            });

            const content = "const carData = " + JSON.stringify(updatedData, null, 2) + ";";

            status.className = "mt-3 text-center text-sm font-bold text-blue-600";
            status.innerText = "⏳ 正在聯絡 GitHub 更新中...";
            document.getElementById('saveBtn').disabled = true;

            try {
                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`);
                const fileData = await res.json();
                
                const updateRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "透過視覺化表單更新銷售方案",
                        content: btoa(unescape(encodeURIComponent(content))),
                        sha: fileData.sha
                    })
                });

                if (updateRes.ok) {
                    status.className = "mt-3 text-center text-sm font-bold text-emerald-600";
                    status.innerText = "✅ 更新成功！頁面即將重新載入。";
                    setTimeout(() => location.reload(), 1500);
                } else {
                    status.className = "mt-3 text-center text-sm font-bold text-red-500";
                    status.innerText = "❌ 更新失敗，請檢查權限。";
                }
            } catch (err) {
                status.className = "mt-3 text-center text-sm font-bold text-red-500";
                status.innerText = "⚠️ 發生錯誤：" + err.message;
            } finally {
                document.getElementById('saveBtn').disabled = false;
            }
        }

        q.addEventListener('input', (e) => render(e.target.value));
        window.onload = () => render();
    </script>
</body>
</html>
